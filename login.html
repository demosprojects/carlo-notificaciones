<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Carlo Essential</title>
    <link rel="icon" href="https://res.cloudinary.com/dkqevscys/image/upload/v1773541304/m9c9n2hvpmmidixvek1s.webp">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:wght@300;400;600&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
     <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b1221">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RV Admin">
    <link rel="apple-touch-icon" href="https://res.cloudinary.com/dkqevscys/image/upload/v1773541304/m9c9n2hvpmmidixvek1s.webp">
   <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --gold-border: rgba(212, 175, 55, 0.2);
            --bg: #050505;
            --surface: #0a0a0a;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: #eee;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fondo atmosférico */
        .bg-atmosphere {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }
        .bg-atmosphere::before {
            content: '';
            position: absolute;
            top: -20%;
            left: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(ellipse, rgba(212,175,55,0.04) 0%, transparent 70%);
            animation: drift 12s ease-in-out infinite alternate;
        }
        .bg-atmosphere::after {
            content: '';
            position: absolute;
            bottom: -20%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(ellipse, rgba(212,175,55,0.03) 0%, transparent 70%);
            animation: drift 16s ease-in-out infinite alternate-reverse;
        }
        @keyframes drift {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(3%, 4%) scale(1.05); }
        }

        /* Líneas decorativas de fondo */
        .bg-lines {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.04;
            background-image:
                repeating-linear-gradient(
                    90deg,
                    rgba(212,175,55,0.5) 0px,
                    rgba(212,175,55,0.5) 1px,
                    transparent 1px,
                    transparent 80px
                );
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 2rem;
            backdrop-filter: blur(24px);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Línea dorada superior */
        .login-card::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            border-radius: 1px;
        }

        /* Logo */
        .logo-wrap {
            text-align: center;
            margin-bottom: 2.5rem;
            animation: fadeUp 0.8s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .logo-name {
            font-family: 'Cinzel', serif;
            font-size: 1.25rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--gold);
        }
        .logo-sub {
            font-family: 'Cormorant Garamond', serif;
            font-size: 0.65rem;
            letter-spacing: 0.45em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            margin-top: 0.4rem;
        }

        /* Divisor ornamental */
        .ornament {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 0 auto 2rem;
            width: 60%;
        }
        .ornament-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold-border));
        }
        .ornament-line.right {
            background: linear-gradient(90deg, var(--gold-border), transparent);
        }
        .ornament-diamond {
            width: 5px;
            height: 5px;
            background: var(--gold);
            transform: rotate(45deg);
            opacity: 0.6;
            flex-shrink: 0;
        }

        /* Título */
        .login-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 300;
            color: #fff;
            text-align: center;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
            animation: fadeUp 0.8s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Inputs */
        .field {
            margin-bottom: 1.25rem;
            animation: fadeUp 0.8s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .field:nth-child(2) { animation-delay: 0.35s; }

        .field label {
            display: block;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
            margin-bottom: 0.6rem;
        }
        .field-wrap {
            position: relative;
        }
        .field-wrap .icon-left {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            transition: color 0.3s;
            pointer-events: none;
            z-index: 1;
        }
        .field-wrap:focus-within .icon-left { color: rgba(212,175,55,0.5); }
        .field input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 0.85rem;
            padding: 0.95rem 2.75rem 0.95rem 2.75rem;
            color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.3s, background 0.3s;
        }
        .field input:focus {
            border-color: var(--gold-border);
            background: rgba(212,175,55,0.04);
        }
        .field input::placeholder { color: rgba(255,255,255,0.15); }

        /* Toggle password — pegado al borde derecho del input */
        .toggle-pass {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 2.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            color: rgba(255,255,255,0.25);
            cursor: pointer;
            font-size: 0.75rem;
            transition: color 0.3s;
            border-radius: 0 0.85rem 0.85rem 0;
        }
        .toggle-pass:hover { color: var(--gold); }

        /* Error */
        #error-msg {
            display: none;
            background: rgba(239,68,68,0.08);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            font-size: 0.72rem;
            color: #f87171;
            text-align: center;
            margin-bottom: 1.25rem;
            letter-spacing: 0.02em;
            animation: shake 0.4s ease;
        }
        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60%  { transform: translateX(-6px); }
            40%,80%  { transform: translateX(6px); }
        }

        /* Botón */
        .btn-login {
            width: 100%;
            padding: 1rem;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 999px;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
            margin-top: 0.5rem;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.8s 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .btn-login::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0);
            transition: background 0.2s;
        }
        .btn-login:hover {
            background: #e8c84a;
            box-shadow: 0 8px 40px rgba(212,175,55,0.25);
            transform: translateY(-1px);
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner dentro del botón */
        .btn-spinner {
            display: none;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(0,0,0,0.3);
            border-top-color: #000;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .btn-login.loading .btn-text { display: none; }
        .btn-login.loading .btn-spinner { display: block; }
    </style>
</head>
<body>

    <div class="bg-atmosphere"></div>
    <div class="bg-lines"></div>

    <div class="login-card">

        <div class="logo-wrap">
            <div class="logo-name">Carlo Essential</div>
            <div class="logo-sub">Panel de administración</div>
        </div>

        <div class="ornament">
            <div class="ornament-line"></div>
            <div class="ornament-diamond"></div>
            <div class="ornament-line right"></div>
        </div>

        <h2 class="login-title">Iniciar sesión</h2>

        <div id="error-msg"></div>

        <div class="field">
            <label>Correo electrónico</label>
            <div class="field-wrap">
                <input type="email" id="email" placeholder="admin@carloessential.com" autocomplete="email">
                <i class="fa-solid fa-envelope icon-left"></i>
            </div>
        </div>

        <div class="field">
            <label>Contraseña</label>
            <div class="field-wrap">
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
                <i class="fa-solid fa-lock icon-left"></i>
                <button class="toggle-pass" type="button" id="toggle-pass" tabindex="-1">
                    <i class="fa-solid fa-eye" id="eye-icon"></i>
                </button>
            </div>
        </div>

        <button class="btn-login" id="btn-login">
            <span class="btn-text">Ingresar</span>
            <div class="btn-spinner"></div>
        </button>

    </div>

    <script type="module" src="login.js"></script>
    <script>
        // Toggle password visibility
        document.getElementById('toggle-pass').addEventListener('click', () => {
            const input = document.getElementById('password');
            const icon  = document.getElementById('eye-icon');
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            icon.className = isPass ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye';
        });

        // Enter key
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('btn-login').click();
        });
        document.getElementById('email').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
    </script>

     <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('[PWA] SW registrado:', reg.scope))
            .catch(err => console.warn('[PWA] Error:', err));
        });
      }
    </script>
</body>
</html>
